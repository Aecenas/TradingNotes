<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Event - TradingNotes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f1ebd",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-sm">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
<button class="flex items-center text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
<span class="ml-1 text-sm font-medium">Cancel</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Add Event</h1>
<button class="bg-primary hover:bg-primary/90 text-white px-4 py-1.5 rounded-lg text-sm font-bold transition-all shadow-sm">
                Save Event
            </button>
</header>
<main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-8">
<!-- Event Type Section -->
<section>
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3">Event Type</h3>
<div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl overflow-x-auto gap-1">
<label class="flex-1 min-w-[80px] cursor-pointer group">
<input checked="" class="sr-only peer" name="event-type" type="radio" value="note"/>
<div class="flex flex-col items-center justify-center py-2 px-1 rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm text-slate-500 dark:text-slate-400 peer-checked:text-primary transition-all">
<span class="material-symbols-outlined mb-1">description</span>
<span class="text-[11px] font-semibold">Note</span>
</div>
</label>
<label class="flex-1 min-w-[80px] cursor-pointer group">
<input class="sr-only peer" name="event-type" type="radio" value="entry"/>
<div class="flex flex-col items-center justify-center py-2 px-1 rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm text-slate-500 dark:text-slate-400 peer-checked:text-emerald-600 transition-all">
<span class="material-symbols-outlined mb-1">login</span>
<span class="text-[11px] font-semibold">Entry</span>
</div>
</label>
<label class="flex-1 min-w-[80px] cursor-pointer group">
<input class="sr-only peer" name="event-type" type="radio" value="exit"/>
<div class="flex flex-col items-center justify-center py-2 px-1 rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm text-slate-500 dark:text-slate-400 peer-checked:text-rose-600 transition-all">
<span class="material-symbols-outlined mb-1">logout</span>
<span class="text-[11px] font-semibold">Exit</span>
</div>
</label>
<label class="flex-1 min-w-[80px] cursor-pointer group">
<input class="sr-only peer" name="event-type" type="radio" value="sl"/>
<div class="flex flex-col items-center justify-center py-2 px-1 rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm text-slate-500 dark:text-slate-400 peer-checked:text-primary transition-all">
<span class="material-symbols-outlined mb-1">gpp_maybe</span>
<span class="text-[11px] font-semibold">Stop Loss</span>
</div>
</label>
<label class="flex-1 min-w-[80px] cursor-pointer group">
<input class="sr-only peer" name="event-type" type="radio" value="tp"/>
<div class="flex flex-col items-center justify-center py-2 px-1 rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:shadow-sm text-slate-500 dark:text-slate-400 peer-checked:text-primary transition-all">
<span class="material-symbols-outlined mb-1">target</span>
<span class="text-[11px] font-semibold">Take Profit</span>
</div>
</label>
</div>
</section>
<!-- Scope Selection -->
<section>
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3">Scope</h3>
<div class="grid grid-cols-2 gap-3">
<label class="relative cursor-pointer">
<input checked="" class="sr-only peer" name="scope" type="radio" value="trade"/>
<div class="flex items-center gap-3 p-3 border border-slate-200 dark:border-slate-800 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-slate-400 peer-checked:text-primary">layers</span>
<div class="flex flex-col">
<span class="text-sm font-bold">Trade-level</span>
<span class="text-[10px] text-slate-500">Applies to the entire position</span>
</div>
</div>
</label>
<label class="relative cursor-pointer">
<input class="sr-only peer" name="scope" type="radio" value="leg"/>
<div class="flex items-center gap-3 p-3 border border-slate-200 dark:border-slate-800 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-slate-400 peer-checked:text-primary">splitscreen</span>
<div class="flex flex-col">
<span class="text-sm font-bold">Leg-level</span>
<span class="text-[10px] text-slate-500">Specific leg event</span>
</div>
</div>
</label>
</div>
</section>
<!-- Event Time -->
<section>
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3">Event Time</h3>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">calendar_today</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all" type="datetime-local" value="2023-10-27T14:30"/>
</div>
</section>
<!-- Dynamic Fields (Entry/Exit Specific) -->
<section class="space-y-4">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">Execution Details</h3>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-600 dark:text-slate-400 ml-1">Price</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
<input class="w-full pl-7 py-2.5 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm font-bold focus:ring-2 focus:ring-primary/20" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-600 dark:text-slate-400 ml-1">Quantity</label>
<div class="relative">
<input class="w-full px-4 py-2.5 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm font-bold focus:ring-2 focus:ring-primary/20" placeholder="Units" type="number"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] font-bold">QTY</span>
</div>
</div>
</div>
</section>
<!-- Qualitative Note -->
<section class="space-y-1.5">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">Notes</h3>
<textarea class="w-full p-4 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm leading-relaxed placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20" placeholder="Describe what happened or why this event was triggered..." rows="4"></textarea>
</section>
<!-- Attachments Section -->
<section>
<div class="flex items-center justify-between mb-3">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Attachments</h3>
<span class="text-[10px] font-bold text-slate-400">Max 5MB per file</span>
</div>
<div class="grid grid-cols-3 sm:grid-cols-4 gap-3">
<div class="aspect-square relative rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 group">
<img alt="Trading Chart" class="w-full h-full object-cover" data-alt="Stock market technical analysis candle chart" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhAdlMIawo2drUaEYNVDYq5RArFvuXOSybTrMRbD1DZ5RGgzQRWujSOx9r0VgAglyuZQg5dXnTprwIweNBKIH-Gwjwh7QfS38xOLpzE0YbCjCQJ3PQhNIYvydM6PtD0w2ajA2zpQb9h86gKGuVLmBKKB4r5PkB1p9aAVIsIp8MBp7J4B4dcD7vrE_9mten-wWnVp1kSi7TwKidOvKtzfIVSQNFt9eymkgzy6tNhF9KzU2HwLiVRyTNwpx_KX6EAl94h4P3IGmZ_ps1"/>
<button class="absolute top-1 right-1 p-1 bg-black/50 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="aspect-square relative rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 group">
<img alt="Market Data" class="w-full h-full object-cover" data-alt="Professional financial dashboard with multiple tickers" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3tmP6fEW1CAz9BT22nLkkEUmR-_5reywSp2B76jdTBUKXrFApVN1MWiJ3djZD7TqgYXJljqPZbiaezFtVj5Z7xxpxm1g1htyVbd9fMNMQ2EdQ9OUSmz6W-GBbC5OQjvKs2dkg7mmRtxJkZ8iweL_L4ddVM_S3uoQjw3-uOC3NJq2DUetFwAMEOLhOAiatlB_r4sOd1NAwjJPR8MAzorzE13G7abGmLAHR6pAVkesb-yrEna1LoLvLUJphRg6Ajtm70yHw-FZ_Qux3"/>
<button class="absolute top-1 right-1 p-1 bg-black/50 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<label class="aspect-square flex flex-col items-center justify-center border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-400 text-3xl">add_photo_alternate</span>
<span class="text-[10px] font-bold text-slate-500 mt-1">Upload</span>
<input accept="image/*" class="hidden" multiple="" type="file"/>
</label>
</div>
</section>
</main>
<!-- Footer Help -->
<footer class="p-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">info</span>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                    Recording event-level data helps the system calculate accurate metrics like expectancy, drawdown phases, and leg-specific risk management performance.
                </p>
</div>
</footer>
</div>
</body></html>
